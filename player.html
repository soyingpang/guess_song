<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>華語詩歌估歌仔 · 玩家</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="./styles.css?v=host-audio-broadcast-3" />
    <style>
      .phone-remote-listen {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        border: 1px solid rgba(103, 151, 140, 0.25);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.58);
        padding: 7px;
      }

      .phone-remote-listen > div {
        display: grid;
        min-width: 0;
        gap: 2px;
      }

      .phone-remote-listen strong {
        color: #2d6f50;
        font-size: 0.8rem;
        font-weight: 950;
      }

      .phone-remote-listen span {
        min-width: 0;
        overflow: hidden;
        color: #7b625b;
        font-size: 0.72rem;
        font-weight: 850;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .phone-listen-button {
        min-height: 34px;
        flex: 0 0 auto;
        padding: 6px 9px;
        font-size: 0.78rem;
      }

      .visually-hidden {
        position: absolute;
        width: 1px;
        height: 1px;
        overflow: hidden;
        clip: rect(0 0 0 0);
        clip-path: inset(50%);
        white-space: nowrap;
      }

      .icon-action-button {
        display: inline-grid;
        place-items: center;
        gap: 0;
        min-width: 34px;
        aspect-ratio: 1;
        line-height: 1;
      }

      .icon-action-button svg {
        width: 1.05rem;
        height: 1.05rem;
        fill: none;
        stroke: currentColor;
        stroke-linecap: round;
        stroke-linejoin: round;
        stroke-width: 2.15;
      }

      .mic-button.icon-action-button {
        width: 100%;
        aspect-ratio: auto;
      }

      .mic-button .mic-label {
        font-size: 0.9rem;
        font-weight: 1000;
        letter-spacing: 0;
      }

      .mic-button .mic-live-dot {
        display: none;
        align-items: center;
        justify-content: center;
        min-height: 18px;
        padding: 2px 7px;
        border-radius: 999px;
        background: #fff8ec;
        color: #7a1f16;
        font-size: 0.66rem;
        font-weight: 1000;
        line-height: 1;
      }

      .mic-button.is-live .mic-live-dot {
        display: inline-flex;
      }

      .player-body:not(.is-joined):not(.is-connecting) .player-status,
      .player-body:not(.is-joined) .player-scoreline,
      .player-body:not(.is-joined) .phone-mic-panel,
      .player-body:not(.is-joined) .phone-remote-panel,
      .player-body:not(.is-joined) .phone-question {
        display: none;
      }

      .player-body.is-connecting .player-status {
        display: block;
      }

      .player-body.is-joined.is-remote-player .phone-question {
        order: 1;
      }

      .player-body.is-joined.is-remote-player .phone-remote-panel {
        order: 2;
        flex: 0 0 auto;
      }

      .player-body.is-joined.is-remote-player .phone-remote-roster {
        display: none;
      }

      .player-body.is-joined {
        overflow: hidden;
      }

      .player-body.is-joined .player-shell {
        min-height: 100svh;
        padding: 4px;
      }

      .player-body.is-joined .player-card {
        min-height: calc(100svh - 8px);
        max-height: calc(100svh - 8px);
        padding: 8px;
      }

      .player-body.is-joined .player-card > h1,
      .player-body.is-joined .player-status,
      .player-body.is-joined .mic-status,
      .player-body.is-joined.is-remote-player .phone-remote-head,
      .player-body.is-joined.is-remote-player .phone-remote-grid {
        display: none;
      }

      .player-body.is-joined .player-scoreline {
        grid-template-columns: minmax(0, 1fr) minmax(0, 1fr) 42px;
        gap: 4px;
        margin-top: 0;
      }

      .player-body.is-joined .player-scoreline span,
      .player-body.is-joined .leaderboard-button,
      .player-body.is-joined .mic-button,
      .player-body.is-joined .phone-listen-button {
        min-height: 32px;
        padding: 4px 6px;
        font-size: 0.78rem;
        line-height: 1.05;
      }

      .player-body.is-joined .leaderboard-button {
        min-width: 0;
      }

      .player-body.is-joined .leaderboard-button.icon-action-button,
      .player-body.is-joined .phone-listen-button.icon-action-button,
      .player-body.is-joined .phone-remote-play-button.icon-action-button {
        width: 32px;
        min-width: 32px;
        max-width: 32px;
        aspect-ratio: 1;
        padding: 0;
      }

      .player-body.is-joined .mic-button.icon-action-button {
        display: flex;
        justify-content: center;
        gap: 8px;
        width: 100%;
        min-width: 0;
        max-width: none;
        min-height: 42px;
        padding: 6px 10px;
        border-color: rgba(37, 99, 235, 0.6);
        background: rgba(219, 234, 254, 0.98);
        color: #12306e;
        box-shadow: 0 8px 18px rgba(37, 99, 235, 0.18);
      }

      .player-body.is-joined .mic-button.icon-action-button:disabled {
        border-color: rgba(148, 163, 184, 0.55);
        background: rgba(226, 232, 240, 0.85);
        color: #64748b;
        box-shadow: none;
      }

      .player-body.is-joined .mic-button.icon-action-button.is-live {
        border-color: rgba(220, 38, 38, 0.8);
        background: #b42318;
        color: #fff8ec;
        box-shadow: 0 10px 24px rgba(180, 35, 24, 0.28);
      }

      .player-body.is-joined .mic-button.icon-action-button svg {
        width: 1.1rem;
        height: 1.1rem;
      }

      .player-body.is-joined .phone-mic-panel {
        grid-template-columns: minmax(0, 1fr);
        gap: 0;
        margin-top: 4px;
      }

      .player-body.is-joined .phone-question {
        min-height: 0;
        flex: 1 1 auto;
        margin-top: 4px;
        border-top: 0;
        padding-top: 0;
      }

      .player-body.is-joined .phone-question p {
        min-height: 24px;
        margin-bottom: 4px;
        padding: 3px 8px;
        font-size: 0.74rem;
        line-height: 1.1;
      }

      .player-body.is-joined .phone-question h2 {
        display: -webkit-box;
        overflow: hidden;
        margin: 0;
        font-size: clamp(1rem, 5vw, 1.28rem);
        line-height: 1.05;
        -webkit-box-orient: vertical;
        -webkit-line-clamp: 2;
      }

      .player-body.is-joined .phone-hints {
        max-height: 38px;
        overflow: hidden;
        gap: 4px;
        margin-top: 4px;
      }

      .player-body.is-joined .phone-choices {
        display: grid;
        min-height: 0;
        flex: 1 1 auto;
        gap: 4px;
        margin-top: 4px;
        overflow: hidden;
      }

      .player-body.is-joined .phone-choice {
        min-height: 0;
        padding: 5px 7px;
        gap: 8px;
      }

      .player-body.is-joined .phone-choice-index {
        width: 24px;
        height: 24px;
        flex-basis: 24px;
        font-size: 0.74rem;
      }

      .player-body.is-joined .phone-choice-title {
        display: -webkit-box;
        overflow: hidden;
        font-size: 0.86rem;
        line-height: 1.08;
        -webkit-box-orient: vertical;
        -webkit-line-clamp: 2;
      }

      .player-body.is-joined .phone-result {
        margin-top: 4px;
        padding: 4px 7px;
        font-size: 0.74rem;
        line-height: 1.1;
      }

      .player-body.is-joined .phone-remote-panel {
        gap: 4px;
        margin-top: 4px;
        padding: 4px;
      }

      .player-body.is-joined .phone-remote-listen {
        min-height: 30px;
        padding: 4px 6px;
      }

      .player-body.is-joined .phone-remote-listen strong {
        font-size: 0.72rem;
      }

      .player-body.is-joined .phone-remote-listen span {
        font-size: 0.68rem;
      }

      .player-body.is-joined .phone-remote-media {
        gap: 4px;
        padding: 4px;
      }

      .player-body.is-joined .phone-remote-frame {
        min-height: 48px;
        max-height: 62px;
      }

      .player-body.is-joined .buzz-button {
        min-height: clamp(64px, 14svh, 92px);
        margin-top: 4px;
        font-size: clamp(1.8rem, 10vw, 2.7rem);
      }
    </style>
  </head>
  <body class="player-body">
    <main class="player-shell">
      <section class="player-card">
        <img class="brand-mark" src="./assets/worship-crest.svg" alt="" aria-hidden="true" />
        <p class="eyebrow">加入詩歌遊戲</p>
        <h1>華語詩歌估歌仔</h1>

        <form class="join-form" id="joinForm">
          <div class="player-mode-field" id="playerModeField" hidden>
            <span>你今次點玩？</span>
            <div class="player-mode-switch" aria-label="遊玩方式">
              <button class="player-mode-button" id="onsiteModeButton" type="button">在現場</button>
              <button class="player-mode-button" id="remoteModeButton" type="button">不在現場</button>
            </div>
            <p class="join-note">入房後不可切換；不在現場會用手機同步播放詩歌，畫面會遮住答案。</p>
          </div>
          <label for="playerName">你的名字</label>
          <div class="guess-line">
            <input id="playerName" required autocomplete="name" maxlength="18" placeholder="輸入名字" />
            <button class="primary-button" type="submit">下一步</button>
          </div>
          <p class="join-note">系統會自動平均分 A/B 組，主持可即場微調。</p>
        </form>

        <div class="player-status" id="playerStatus">掃 QR 後輸入名字加入</div>
        <div class="player-scoreline">
          <span id="playerScore">0 分</span>
          <span id="playerRound">未開始</span>
          <button class="ghost-button leaderboard-button" id="openLeaderboardButton" type="button">
            排行榜
          </button>
        </div>

        <section class="phone-mic-panel" aria-label="手機咪高峰">
          <button class="mic-button" id="micToggleButton" type="button" disabled>開咪對話</button>
          <div class="mic-status" id="phoneMicStatus">未開咪</div>
        </section>

        <section class="phone-remote-panel" id="phoneRemotePanel" aria-label="手機同步狀態" hidden>
          <div class="phone-remote-head">
            <strong>手機同步</strong>
            <span id="phoneRemoteStatus">等候主持開始</span>
          </div>
          <div class="phone-remote-grid">
            <span>
              <small>倒數</small>
              <strong id="phoneRemoteCountdown">--</strong>
            </span>
            <span>
              <small>組分</small>
              <strong id="phoneRemoteTeams">A 0 · B 0</strong>
            </span>
            <span>
              <small>開咪</small>
              <strong id="phoneRemoteMic">沒有</strong>
            </span>
          </div>
          <div class="phone-remote-listen" id="phoneRemoteListen">
            <div>
              <strong>現場聲音</strong>
              <span id="phoneRemoteListenStatus">等候主持音訊廣播</span>
            </div>
            <button class="ghost-button phone-listen-button" id="phoneRemoteListenButton" type="button" hidden>
              啟用收聽
            </button>
          </div>
          <div class="phone-remote-media" id="phoneRemoteMedia" hidden>
            <div class="phone-remote-media-head">
              <strong>同步播放器</strong>
              <span id="phoneRemotePlayerStatus">等候歌曲</span>
            </div>
            <div class="phone-remote-frame" aria-label="手機同步播放器">
              <div id="phoneRemotePlayerHost"></div>
              <div class="phone-remote-shield">
                <strong id="phoneRemoteShieldTitle">答案已遮住</strong>
                <span id="phoneRemoteShieldNote">畫面已遮住答案</span>
              </div>
            </div>
            <button class="ghost-button phone-remote-play-button" id="phoneRemotePlayButton" type="button" hidden>
              重新同步播放
            </button>
          </div>
          <div class="phone-remote-roster" id="phoneRemoteRoster"></div>
        </section>

        <section class="phone-question">
          <p id="phoneStatus">等候主持開始</p>
          <h2 id="phoneTitle">準備中</h2>
          <div class="phone-hints" id="phoneHints"></div>
          <div class="phone-choices" id="phoneChoices"></div>
          <button class="buzz-button" id="buzzButton" type="button" hidden>搶答</button>
          <div class="phone-result" id="phoneResult"></div>
        </section>

      </section>

      <div class="phone-modal" id="leaderboardModal" role="dialog" aria-modal="true" aria-labelledby="leaderboardTitle" hidden>
        <div class="phone-modal-panel">
          <div class="phone-modal-head">
            <h2 id="leaderboardTitle">排行榜</h2>
            <button class="ghost-button" id="closeLeaderboardButton" type="button">關閉</button>
          </div>
          <div id="phoneLeaderboard">
            <div class="phone-empty">等候排行榜</div>
          </div>
        </div>
      </div>
    </main>

    <script src="https://unpkg.com/peerjs@1.5.5/dist/peerjs.min.js"></script>
    <script src="./player.js?v=entry-clean-1"></script>
  </body>
</html>
