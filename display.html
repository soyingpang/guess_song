<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>估歌仔 · 前台</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="./styles.css?v=front-audio-unlock-1" />
    <style>
      .youtube-login-prompt {
        position: fixed;
        z-index: 1000;
        inset: 0;
        display: grid;
        place-items: center;
        background: rgba(27, 20, 18, 0.72);
        backdrop-filter: blur(10px);
        padding: 24px;
      }

      .youtube-login-prompt[hidden] {
        display: none;
      }

      .youtube-login-panel {
        display: grid;
        width: min(560px, 100%);
        gap: 16px;
        border: 1px solid rgba(255, 216, 176, 0.54);
        border-radius: 10px;
        background:
          linear-gradient(180deg, rgba(255, 250, 242, 0.98), rgba(255, 246, 232, 0.96)),
          #fff8ec;
        box-shadow:
          0 28px 70px rgba(16, 12, 10, 0.42),
          inset 0 1px 0 rgba(255, 255, 255, 0.7);
        padding: clamp(20px, 4vw, 30px);
        color: #4b2f2a;
      }

      .youtube-login-panel h2 {
        margin: 0;
        color: #3f2420;
        font-size: clamp(1.45rem, 4vw, 2.1rem);
        line-height: 1.08;
      }

      .youtube-login-panel p {
        margin: 0;
        color: #6b4c44;
        font-size: 0.98rem;
        font-weight: 760;
        line-height: 1.55;
      }

      .youtube-login-actions {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
        gap: 10px;
      }

      .youtube-login-actions :is(button, a) {
        display: grid;
        place-items: center;
        min-height: 48px;
        border: 1px solid rgba(111, 67, 52, 0.22);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.72);
        color: #5a352e;
        font: inherit;
        font-size: 0.95rem;
        font-weight: 950;
        text-align: center;
        text-decoration: none;
        cursor: pointer;
      }

      .youtube-login-actions .primary {
        grid-column: 1 / -1;
        border-color: rgba(198, 84, 36, 0.48);
        background: linear-gradient(180deg, #f8b96f, #d9792f);
        color: #fffaf2;
        box-shadow: 0 12px 24px rgba(169, 87, 39, 0.24);
      }

      .youtube-login-note {
        border-left: 4px solid #d9792f;
        background: rgba(255, 236, 213, 0.72);
        padding: 10px 12px;
      }

      .youtube-login-chip {
        position: fixed;
        left: 50%;
        bottom: 18px;
        z-index: 900;
        transform: translateX(-50%);
        min-height: 42px;
        border: 1px solid rgba(198, 84, 36, 0.38);
        border-radius: 999px;
        background:
          linear-gradient(180deg, rgba(255, 250, 242, 0.96), rgba(255, 238, 216, 0.94)),
          #fff8ec;
        color: #6a3529;
        padding: 0 16px;
        font: inherit;
        font-size: 0.82rem;
        font-weight: 950;
        box-shadow: 0 12px 28px rgba(45, 25, 20, 0.22);
        cursor: pointer;
      }
    </style>
  </head>
  <body class="display-body">
    <button class="youtube-login-chip" id="youtubeLoginOpenButton" type="button">YouTube Premium 登入</button>

    <main class="stage-shell">
      <section class="stage-hero" aria-live="polite">
        <div class="stage-top">
          <div class="brand-block">
            <img class="brand-mark" src="./assets/worship-crest.svg" alt="" aria-hidden="true" />
            <p class="eyebrow" id="stageEyebrow">估歌仔</p>
            <h1 id="stageGameTitle">估歌仔</h1>
          </div>
          <div class="stage-score">
            <span id="stageRound">第 0 題</span>
            <span id="stageScore">0 / 0</span>
            <span id="stageTeams">A 0 · B 0</span>
          </div>
        </div>

        <div class="stage-player">
          <div id="stagePlayerHost"></div>
          <div class="stage-mask" id="stageMask">
            <div class="pulse-disc stage-disc" aria-hidden="true"></div>
            <strong id="stagePrompt">等候主持開始</strong>
            <span id="stageSubPrompt">請望住大畫面，聽片段估歌名</span>
          </div>
          <button class="stage-sound-button" id="stageSoundButton" type="button" hidden>
            啟用前台聲音
          </button>
        </div>

        <div class="stage-info">
          <p id="stageStatus">未有題目</p>
          <h2 id="stageTitle">準備開始</h2>
          <div class="stage-answer-meta" id="stageMeta"></div>
        </div>

        <div class="stage-hints" id="stageHints"></div>
        <div class="stage-choices" id="stageChoices"></div>
        <div class="stage-leaderboard" id="stageLeaderboard"></div>
      </section>

      <aside class="stage-roster" id="stageRoster" aria-label="玩家狀態" hidden></aside>

      <aside class="stage-qr" id="stageQrPanel">
        <img id="stageQr" alt="玩家加入 QR code" />
        <div>
          <strong>掃碼加入</strong>
          <span id="stageRoom">等待房間</span>
        </div>
      </aside>
    </main>

    <section class="youtube-login-prompt" id="youtubeLoginPrompt" role="dialog" aria-modal="true" aria-labelledby="youtubeLoginTitle" hidden>
      <div class="youtube-login-panel">
        <h2 id="youtubeLoginTitle">先登入 YouTube Premium</h2>
        <p>為了減少 YouTube 廣告，請先用這個 Chrome 視窗登入有 Premium 的 YouTube 帳號。登入完成後回到這個前台頁面，按「我已登入」重新載入前台。</p>
        <p class="youtube-login-note">登入頁會用 YouTube 官方新視窗開啟。這個 App 不能直接讀取或儲存你的 Google 帳號資料。</p>
        <div class="youtube-login-actions">
          <a class="primary" id="youtubeLoginButton" href="https://accounts.google.com/ServiceLogin?service=youtube&continue=https%3A%2F%2Fwww.youtube.com%2F" target="_blank" rel="noopener">開啟 YouTube 登入</a>
          <button id="youtubeLoginReadyButton" type="button">我已登入，重新載入前台</button>
          <button id="youtubeLoginSkipButton" type="button">略過今次</button>
        </div>
      </div>
    </section>

    <script src="./vendor/peerjs.min.js?v=1.5.5"></script>
    <script src="./local-qr.js?v=host-audio-broadcast-3"></script>
    <script src="./display.js?v=vpn-onsite-1"></script>
  </body>
</html>
