<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>估歌仔</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">YouTube Song Quiz</p>
          <h1>估歌仔</h1>
        </div>
        <div class="score-strip" aria-label="分數">
          <div>
            <span id="scoreCorrect">0</span>
            <small>答中</small>
          </div>
          <div>
            <span id="scoreTotal">0</span>
            <small>題目</small>
          </div>
          <div>
            <span id="scoreStreak">0</span>
            <small>連勝</small>
          </div>
        </div>
      </header>

      <main class="workspace">
        <section class="quiz-panel" aria-labelledby="quizTitle">
          <div class="player-wrap">
            <div id="playerHost"></div>
            <div class="player-mask" id="playerMask">
              <div class="pulse-disc" aria-hidden="true"></div>
              <span id="maskLabel">準備開始</span>
            </div>
          </div>

          <div class="quiz-head">
            <div>
              <p class="round-label" id="roundLabel">第 0 題</p>
              <h2 id="quizTitle">揀一首歌開始</h2>
            </div>
            <button class="icon-button" id="toggleVideoButton" type="button" title="顯示/隱藏影片">
              顯示影片
            </button>
          </div>

          <div class="transport-grid">
            <button class="primary-button" id="playButton" type="button">播放片段</button>
            <button class="ghost-button" id="replayButton" type="button">重播</button>
            <button class="ghost-button" id="skipButton" type="button">跳過</button>
            <button class="ghost-button" id="nextButton" type="button">下一題</button>
          </div>

          <div class="mode-row" role="group" aria-label="答題模式">
            <button class="segmented is-active" id="typedModeButton" type="button">輸入答案</button>
            <button class="segmented" id="choiceModeButton" type="button">四選一</button>
          </div>

          <form class="guess-form" id="guessForm">
            <label for="guessInput">答案</label>
            <div class="guess-line">
              <input id="guessInput" autocomplete="off" placeholder="歌名 / 歌手" />
              <button class="primary-button" type="submit">提交</button>
            </div>
          </form>

          <div class="choices" id="choices" aria-label="選項"></div>

          <div class="result-bar" id="resultBar" role="status" aria-live="polite">
            <span id="resultText">未開始</span>
            <strong id="answerText"></strong>
          </div>
        </section>

        <aside class="library-panel" aria-labelledby="libraryTitle">
          <div class="library-head">
            <div>
              <p class="eyebrow">Library</p>
              <h2 id="libraryTitle">歌庫</h2>
            </div>
            <span id="songCount">0 首</span>
          </div>

          <form class="song-form" id="songForm">
            <label for="songTitle">歌名</label>
            <input id="songTitle" required placeholder="例如：海闊天空" />

            <label for="songUrl">YouTube URL / ID</label>
            <input id="songUrl" required placeholder="https://youtu.be/..." />

            <div class="form-grid">
              <div>
                <label for="songStart">開始秒數</label>
                <input id="songStart" type="number" min="0" step="1" value="30" />
              </div>
              <div>
                <label for="songDuration">長度</label>
                <input id="songDuration" type="number" min="3" max="60" step="1" value="12" />
              </div>
            </div>

            <label for="songAliases">別名</label>
            <input id="songAliases" placeholder="逗號分隔，可空白" />

            <button class="primary-button full-width" type="submit">加入歌庫</button>
          </form>

          <div class="library-tools">
            <button class="ghost-button" id="exportButton" type="button">匯出</button>
            <label class="file-button" for="importInput">匯入</label>
            <input id="importInput" type="file" accept="application/json" />
            <button class="danger-button" id="resetButton" type="button">重設</button>
          </div>

          <div class="song-list" id="songList"></div>
        </aside>
      </main>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
