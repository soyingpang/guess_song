<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>華語詩歌估歌仔 · 玩家</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="./styles.css?v=mobile-compact-teams-1" />
  </head>
  <body class="player-body">
    <main class="player-shell">
      <section class="player-card">
        <img class="brand-mark" src="./assets/worship-crest.svg" alt="" aria-hidden="true" />
        <p class="eyebrow">加入詩歌遊戲</p>
        <h1>華語詩歌估歌仔</h1>

        <form class="join-form" id="joinForm">
          <label for="playerName">你的名字</label>
          <div class="guess-line">
            <input id="playerName" required autocomplete="name" maxlength="18" placeholder="輸入名字" />
            <button class="primary-button" type="submit">加入</button>
          </div>
          <p class="join-note">系統會自動平均分 A/B 組，主持可即場微調。</p>
        </form>

        <div class="player-status" id="playerStatus">掃 QR 後輸入名字加入</div>
        <div class="player-scoreline">
          <span id="playerScore">0 分</span>
          <span id="playerRound">未開始</span>
          <button class="ghost-button leaderboard-button" id="openLeaderboardButton" type="button">
            排行榜
          </button>
        </div>

        <section class="phone-mic-panel" aria-label="手機咪高峰">
          <button class="mic-button" id="micToggleButton" type="button" disabled>開咪對話</button>
          <div class="mic-status" id="phoneMicStatus">未開咪</div>
        </section>

        <section class="phone-question">
          <p id="phoneStatus">等候主持開始</p>
          <h2 id="phoneTitle">準備中</h2>
          <div class="phone-hints" id="phoneHints"></div>
          <div class="phone-choices" id="phoneChoices"></div>
          <button class="buzz-button" id="buzzButton" type="button" hidden>搶答</button>
          <div class="phone-result" id="phoneResult"></div>
        </section>

      </section>

      <div class="phone-modal" id="leaderboardModal" role="dialog" aria-modal="true" aria-labelledby="leaderboardTitle" hidden>
        <div class="phone-modal-panel">
          <div class="phone-modal-head">
            <h2 id="leaderboardTitle">排行榜</h2>
            <button class="ghost-button" id="closeLeaderboardButton" type="button">關閉</button>
          </div>
          <div id="phoneLeaderboard">
            <div class="phone-empty">等候排行榜</div>
          </div>
        </div>
      </div>
    </main>

    <script src="https://unpkg.com/peerjs@1.5.5/dist/peerjs.min.js"></script>
    <script src="./player.js?v=mobile-compact-teams-1"></script>
  </body>
</html>
