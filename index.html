<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>華語詩歌估歌仔</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="./styles.css?v=host-audio-broadcast-3" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand-block">
          <img class="brand-mark" src="./assets/worship-crest.svg" alt="" aria-hidden="true" />
          <p class="eyebrow">團契詩歌時間</p>
          <h1>華語詩歌估歌仔</h1>
        </div>
        <div class="topbar-actions">
          <button class="ghost-button" id="openDisplayButton" type="button">開前台</button>
          <button class="ghost-button" id="showLeaderboardButton" type="button">排行榜</button>
          <button class="ghost-button" id="showWinnerButton" type="button">公布勝方</button>
          <button class="ghost-button" id="resetGameButton" type="button">分數重置</button>
          <div class="score-strip" aria-label="分數">
            <div>
              <span id="scoreCorrect">0</span>
              <small>答中</small>
            </div>
            <div>
              <span id="scoreTotal">0</span>
              <small>已判</small>
            </div>
            <div>
              <span id="scoreStreak">0</span>
              <small>連勝</small>
            </div>
          </div>
        </div>
      </header>

      <main class="workspace">
        <section class="quiz-panel" aria-labelledby="quizTitle">
          <div class="player-wrap">
            <div id="playerHost"></div>
            <div class="player-mask" id="playerMask">
              <div class="pulse-disc" aria-hidden="true"></div>
              <span id="maskLabel">聽前奏，估詩歌</span>
            </div>
          </div>

          <div class="quiz-head">
            <div>
              <p class="round-label" id="roundLabel">未有題目</p>
              <h2 id="quizTitle">先加入詩歌</h2>
            </div>
            <button class="icon-button" id="toggleVideoButton" type="button" title="顯示或隱藏影片">
              顯示影片
            </button>
          </div>

          <div class="filter-row">
            <label for="categoryFilter">只玩分類</label>
            <select id="categoryFilter">
              <option value="all">全部分類</option>
            </select>
          </div>

          <div class="transport-grid">
            <button class="primary-button" id="playButton" type="button">重播片段</button>
            <button class="ghost-button" id="replayButton" type="button">重播片段</button>
            <button class="ghost-button" id="stopButton" type="button">停止</button>
            <button class="ghost-button" id="hintButton" type="button">提示</button>
            <button class="ghost-button" id="skipButton" type="button">開估</button>
            <button class="ghost-button" id="nextButton" type="button">下一題播放</button>
          </div>

          <div class="mode-row three" role="group" aria-label="播放秒數">
            <button class="segmented" id="duration60Button" type="button">60 秒</button>
            <button class="segmented is-active" id="duration30Button" type="button">30 秒</button>
            <button class="segmented" id="duration15Button" type="button">15 秒</button>
          </div>

          <div class="mode-row" role="group" aria-label="播放起點">
            <button class="segmented is-active" id="startBeginningButton" type="button">由頭播</button>
            <button class="segmented" id="startRandomButton" type="button">隨機中段</button>
          </div>

          <div class="mode-row three" role="group" aria-label="答題模式">
            <button class="segmented is-active" id="choiceModeButton" type="button">一：四選一</button>
            <button class="segmented" id="buzzModeButton" type="button">二：搶答估歌</button>
            <button class="segmented" id="wordModeButton" type="button">三：主題搶唱</button>
          </div>

          <div class="host-actions" id="judgeControls" hidden>
            <button class="primary-button" id="markCorrectButton" type="button">答中 / 加分</button>
            <button class="ghost-button" id="markWrongButton" type="button">未中</button>
            <button class="ghost-button" id="reopenBuzzButton" type="button">開放搶答</button>
          </div>

          <div class="word-controls" id="wordControls" hidden>
            <div class="word-control-line">
              <label for="wordInput">主題 / 關鍵詞</label>
              <input id="wordInput" maxlength="8" placeholder="例如：平安 / 恩典 / 愛" />
            </div>
            <button class="ghost-button" id="randomWordButton" type="button">抽主題</button>
            <button class="primary-button" id="startWordButton" type="button">開始主題</button>
          </div>

          <div class="team-score-strip" aria-label="分組分數">
            <div><strong id="teamAScore">0</strong><span>A 組</span></div>
            <div><strong id="teamBScore">0</strong><span>B 組</span></div>
          </div>

          <form class="guess-form" id="guessForm" hidden>
            <label for="guessInput">答案</label>
            <div class="guess-line">
              <input id="guessInput" autocomplete="off" placeholder="輸入詩歌名 / 別名 / 編號" />
              <button class="primary-button" type="submit">提交</button>
            </div>
          </form>

          <div class="choices" id="choices" aria-label="選項" hidden></div>
          <div class="hint-stack" id="hintStack" aria-live="polite"></div>

          <div class="result-bar" id="resultBar" role="status" aria-live="polite">
            <span id="resultText">加入詩歌後就可以開始</span>
            <strong id="answerText"></strong>
          </div>
        </section>

        <aside class="library-panel control-sidebar" aria-label="主持側欄">
          <section class="players-panel" aria-labelledby="playersTitle">
            <div class="library-head">
              <div>
                <p class="eyebrow">同場玩家</p>
                <h2 id="playersTitle">玩家</h2>
              </div>
              <span id="playerCount">0 位</span>
            </div>
            <div class="room-status" id="roomStatus">房間建立中</div>
            <div class="room-tools">
              <button class="ghost-button" id="copyPlayerLinkButton" type="button">複製玩家連結</button>
              <button class="ghost-button" id="copyDisplayLinkButton" type="button">複製前台連結</button>
              <button class="ghost-button" id="audioBroadcastButton" type="button">開始音訊廣播</button>
            </div>
            <div class="room-status audio-broadcast-status" id="audioBroadcastStatus">不在現場聲音：未廣播</div>
            <div class="player-list" id="playerList"></div>
          </section>

          <details class="library-drawer">
            <summary>
              <div>
                <p class="eyebrow">詩歌題庫</p>
                <h2 id="libraryTitle">題庫管理</h2>
              </div>
              <span id="songCount">0 首</span>
            </summary>

            <form class="song-form" id="songForm">
              <label for="songTitle">詩歌名</label>
              <input id="songTitle" required placeholder="例如：全因為祢" />

              <label for="songUrl">YouTube URL / ID</label>
              <input id="songUrl" placeholder="貼 YouTube 連結；如使用授權媒體可留空" />

              <label for="songAudioUrl">本地 / 已授權音訊或影片 URL</label>
              <input id="songAudioUrl" placeholder="例如：./audio/song.mp3 或 ./video/song.mp4；有填就優先使用" />

              <div class="form-grid">
                <div>
                  <label for="songStart">開始秒數（固定 0）</label>
                  <input id="songStart" type="number" min="0" step="1" value="0" readonly />
                </div>
                <div>
                  <label for="songDuration">估時參考（固定 60 秒，不截停）</label>
                  <input id="songDuration" type="number" min="60" max="60" step="1" value="60" readonly />
                </div>
              </div>

              <div class="form-grid">
                <div>
                  <label for="songCategory">分類</label>
                  <input id="songCategory" placeholder="敬拜 / 兒童 / 佈道 / 聖誕" />
                </div>
                <div>
                  <label for="songNumber">編號</label>
                  <input id="songNumber" placeholder="可空白" />
                </div>
              </div>

              <label for="songSource">詩歌集 / 來源</label>
              <input id="songSource" placeholder="例如：生命聖詩 / ACM / 小組常唱" />

              <label for="songHint">提示</label>
              <input id="songHint" placeholder="例如：副歌好多人一聽就識，可空白" />

              <label for="songAliases">可接受答案</label>
              <input id="songAliases" placeholder="別名、英文名、常用簡稱，用逗號分隔" />

              <button class="primary-button full-width" id="songSubmitButton" type="submit">
                加入詩歌
              </button>
            </form>

            <div class="library-tools">
              <button class="ghost-button" id="cloudButton" type="button">線上題庫</button>
              <button class="ghost-button" id="exportButton" type="button">匯出</button>
              <label class="file-button" for="importInput">匯入</label>
              <input id="importInput" type="file" accept="application/json" />
              <button class="danger-button" id="resetButton" type="button">清空</button>
            </div>

            <div class="song-list" id="songList"></div>
          </details>
        </aside>
      </main>
    </div>

    <script src="https://unpkg.com/peerjs@1.5.5/dist/peerjs.min.js"></script>
    <script src="./app.js?v=buzz-pause-retry-1"></script>
  </body>
</html>
