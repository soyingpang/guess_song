<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>估歌仔 · 玩家</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="./styles.css?v=prep-cover-art-1" />
    <style>
      .phone-remote-listen {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        align-items: center;
        gap: 10px;
        border: 1px solid rgba(42, 119, 105, 0.22);
        border-radius: 8px;
        background:
          linear-gradient(135deg, rgba(236, 253, 245, 0.92), rgba(255, 248, 236, 0.88)),
          #fffaf2;
        padding: 9px;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.72);
      }

      .phone-remote-listen > div {
        display: grid;
        min-width: 0;
        gap: 2px;
      }

      .phone-remote-listen strong {
        color: #226755;
        font-size: 0.8rem;
        font-weight: 950;
      }

      .phone-remote-listen span {
        min-width: 0;
        overflow: hidden;
        color: #6e5a54;
        font-size: 0.72rem;
        font-weight: 850;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .phone-listen-button {
        min-height: 34px;
        flex: 0 0 auto;
        padding: 6px 9px;
        font-size: 0.78rem;
      }

      .phone-listen-button .phone-listen-label {
        display: none;
      }

      .phone-listen-button.is-needed .phone-listen-label {
        display: inline;
        font-weight: 1000;
      }

      .visually-hidden {
        position: absolute;
        width: 1px;
        height: 1px;
        overflow: hidden;
        clip: rect(0 0 0 0);
        clip-path: inset(50%);
        white-space: nowrap;
      }

      .icon-action-button {
        display: inline-grid;
        place-items: center;
        gap: 0;
        min-width: 34px;
        aspect-ratio: 1;
        line-height: 1;
      }

      .icon-action-button svg {
        width: 1.05rem;
        height: 1.05rem;
        fill: none;
        stroke: currentColor;
        stroke-linecap: round;
        stroke-linejoin: round;
        stroke-width: 2.15;
      }

      .mic-button.icon-action-button {
        width: 100%;
        aspect-ratio: auto;
      }

      .mic-button .mic-label {
        font-size: 0.9rem;
        font-weight: 1000;
        letter-spacing: 0;
      }

      .mic-button .mic-live-dot {
        display: none;
        align-items: center;
        justify-content: center;
        min-height: 18px;
        padding: 2px 7px;
        border-radius: 999px;
        background: #fff8ec;
        color: #7a1f16;
        font-size: 0.66rem;
        font-weight: 1000;
        line-height: 1;
      }

      .mic-button.is-live .mic-live-dot {
        display: inline-flex;
      }

      .player-mode-field {
        gap: 12px;
        border-color: rgba(42, 119, 105, 0.22);
        border-radius: 8px;
        background:
          linear-gradient(135deg, rgba(255, 250, 242, 0.96), rgba(236, 253, 245, 0.82) 48%, rgba(239, 246, 255, 0.9));
        padding: 12px;
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.72),
          0 12px 28px rgba(74, 40, 40, 0.08);
      }

      .player-mode-field > span {
        color: #3f312d;
        font-size: 1.02rem;
        font-weight: 1000;
        line-height: 1.2;
      }

      .player-mode-field .player-mode-switch {
        grid-template-columns: minmax(0, 1fr);
        gap: 9px;
      }

      .player-mode-button {
        position: relative;
        display: grid;
        grid-template-columns: 48px minmax(0, 1fr);
        align-items: center;
        gap: 12px;
        min-height: 86px;
        overflow: hidden;
        border-width: 1px;
        border-radius: 8px;
        padding: 12px 13px 12px 15px;
        text-align: left;
        transition:
          border-color 160ms ease,
          box-shadow 160ms ease,
          transform 160ms ease,
          background 160ms ease;
      }

      .player-mode-button::before {
        content: "";
        position: absolute;
        top: 10px;
        bottom: 10px;
        left: 0;
        width: 4px;
        border-radius: 0 999px 999px 0;
        background: var(--mode-accent, #2d6f50);
        opacity: 0.82;
      }

      .player-mode-button strong,
      .player-mode-button small {
        display: block;
        min-width: 0;
      }

      .player-mode-button strong {
        font-size: 1.12rem;
        line-height: 1.15;
      }

      .player-mode-button small {
        margin-top: 3px;
        color: rgba(55, 43, 39, 0.76);
        font-size: 0.8rem;
        font-weight: 850;
        line-height: 1.25;
      }

      .mode-card-icon {
        display: grid;
        width: 48px;
        height: 48px;
        place-items: center;
        border-radius: 8px;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.58);
      }

      .mode-card-icon svg {
        width: 24px;
        height: 24px;
        fill: none;
        stroke: currentColor;
        stroke-linecap: round;
        stroke-linejoin: round;
        stroke-width: 2.2;
      }

      #onsiteModeButton {
        --mode-accent: #2f7a55;
        border-color: rgba(47, 122, 85, 0.34);
        background:
          linear-gradient(180deg, rgba(238, 252, 244, 0.98), rgba(255, 248, 236, 0.94)),
          #f7fbf1;
        color: #24543f;
        box-shadow: 0 9px 18px rgba(47, 122, 85, 0.11);
      }

      #onsiteModeButton .mode-card-icon {
        background: rgba(47, 122, 85, 0.13);
      }

      #remoteModeButton {
        --mode-accent: #2563eb;
        border-color: rgba(37, 99, 235, 0.32);
        background:
          linear-gradient(180deg, rgba(239, 246, 255, 0.98), rgba(244, 247, 255, 0.9)),
          #f5f8ff;
        color: #163a73;
        box-shadow: 0 8px 18px rgba(37, 99, 235, 0.12);
      }

      #remoteModeButton .mode-card-icon {
        background: rgba(37, 99, 235, 0.13);
      }

      .player-mode-button.is-active {
        transform: translateY(-1px);
        border-color: var(--mode-accent, #2d6f50);
        box-shadow:
          0 0 0 3px rgba(251, 191, 36, 0.25),
          0 12px 24px rgba(74, 40, 40, 0.14);
      }

      .player-body:not(.is-joined):not(.is-connecting) .player-status,
      .player-body:not(.is-joined) .player-scoreline,
      .player-body:not(.is-joined) .phone-mic-panel,
      .player-body:not(.is-joined) .phone-remote-panel,
      .player-body:not(.is-joined) .phone-question {
        display: none;
      }

      .player-body.is-connecting .player-status {
        display: block;
      }

      .player-body.is-joined.is-remote-player .phone-question {
        order: 1;
      }

      .player-body.is-joined.is-remote-player .phone-remote-panel {
        order: 2;
        flex: 0 0 auto;
      }

      .player-body.is-joined.is-remote-player .phone-remote-roster {
        display: none;
      }

      .player-body.is-joined {
        overflow-x: hidden;
        overflow-y: auto;
        overscroll-behavior-y: contain;
        background:
          linear-gradient(145deg, #221d2f 0%, #123f43 48%, #5c3b2c 100%);
        color: #fff8ec;
      }

      .player-body.is-joined .player-shell {
        min-height: 100svh;
        padding: 5px;
        padding-bottom: calc(5px + env(safe-area-inset-bottom));
      }

      .player-body.is-joined .player-card {
        position: relative;
        display: flex;
        min-height: calc(100svh - 8px);
        max-height: none;
        flex-direction: column;
        overflow: visible;
        border: 1px solid rgba(255, 210, 115, 0.36);
        background:
          linear-gradient(180deg, rgba(38, 45, 56, 0.98), rgba(25, 28, 39, 0.99));
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.16),
          0 18px 36px rgba(0, 0, 0, 0.32);
        padding: 7px;
      }

      .player-body.is-joined .player-card::before,
      .player-body.is-joined .player-card::after {
        display: none;
      }

      .player-body.is-joined .player-card > h1,
      .player-body.is-joined .player-status {
        display: none;
      }

      .player-body.is-joined .player-scoreline {
        grid-template-columns: minmax(0, 1fr) minmax(0, 1fr) 42px;
        gap: 6px;
        margin-top: 0;
      }

      .player-body.is-joined .player-scoreline span,
      .player-body.is-joined .leaderboard-button,
      .player-body.is-joined .mic-button,
      .player-body.is-joined .phone-listen-button {
        min-height: 36px;
        padding: 4px 6px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 8px;
        font-size: 0.8rem;
        font-weight: 1000;
        line-height: 1.05;
      }

      .player-body.is-joined .player-scoreline span {
        display: grid;
        place-items: center;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.14), rgba(255, 255, 255, 0.05)),
          rgba(21, 27, 37, 0.92);
        color: #fff8ec;
        box-shadow: inset 0 -2px 0 rgba(0, 0, 0, 0.18);
      }

      .player-body.is-joined #playerScore::before,
      .player-body.is-joined #playerRound::before {
        display: block;
        color: #7dd3fc;
        font-size: 0.55rem;
        font-weight: 1000;
        line-height: 1;
      }

      .player-body.is-joined #playerScore::before {
        content: "分數";
        color: #fbbf24;
      }

      .player-body.is-joined #playerRound::before {
        content: "回合";
      }

      .player-body.is-joined .leaderboard-button {
        min-width: 0;
        border-color: rgba(251, 191, 36, 0.44);
        background:
          linear-gradient(180deg, rgba(251, 191, 36, 0.26), rgba(217, 119, 6, 0.16)),
          rgba(22, 26, 35, 0.94);
        color: #fde68a;
      }

      .player-body.is-joined .leaderboard-button.icon-action-button,
      .player-body.is-joined .phone-listen-button.icon-action-button,
      .player-body.is-joined .phone-remote-play-button.icon-action-button {
        width: 32px;
        min-width: 32px;
        max-width: 32px;
        aspect-ratio: 1;
        padding: 0;
      }

      .player-body.is-joined .leaderboard-button,
      .player-body.is-joined .mic-button,
      .player-body.is-joined .phone-listen-button,
      .player-body.is-joined .phone-remote-play-button,
      .player-body.is-joined .phone-choice,
      .player-body.is-joined .buzz-button {
        touch-action: manipulation;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
        -webkit-user-select: none;
      }

      .player-body.is-joined .phone-listen-button.icon-action-button.is-needed {
        display: inline-flex;
        width: auto;
        min-width: 74px;
        max-width: none;
        aspect-ratio: auto;
        gap: 6px;
        padding: 0 10px;
        border-color: rgba(251, 191, 36, 0.58);
        background:
          linear-gradient(180deg, rgba(251, 191, 36, 0.28), rgba(14, 165, 233, 0.1)),
          rgba(17, 24, 39, 0.92);
        color: #fef3c7;
      }

      .player-body.is-joined .mic-button.icon-action-button {
        display: flex;
        justify-content: center;
        gap: 8px;
        width: 100%;
        min-width: 0;
        max-width: none;
        min-height: 38px;
        padding: 6px 10px;
        border-color: rgba(45, 212, 191, 0.62);
        border-radius: 8px;
        background:
          linear-gradient(180deg, rgba(45, 212, 191, 0.24), rgba(20, 184, 166, 0.11)),
          rgba(15, 38, 43, 0.92);
        color: #ccfbf1;
        box-shadow: 0 8px 18px rgba(13, 148, 136, 0.18);
      }

      .player-body.is-joined .mic-button.icon-action-button:disabled {
        border-color: rgba(148, 163, 184, 0.55);
        background: rgba(226, 232, 240, 0.85);
        color: #64748b;
        box-shadow: none;
      }

      .player-body.is-joined .mic-button.icon-action-button.is-live {
        border-color: rgba(220, 38, 38, 0.8);
        background:
          linear-gradient(180deg, rgba(248, 113, 113, 0.38), rgba(185, 28, 28, 0.32)),
          #7f1d1d;
        color: #fff8ec;
        box-shadow: 0 10px 24px rgba(180, 35, 24, 0.28);
      }

      .player-body.is-joined .mic-button.icon-action-button svg {
        width: 1.1rem;
        height: 1.1rem;
      }

      .player-body.is-joined .phone-mic-panel {
        grid-template-columns: minmax(0, 1fr);
        gap: 4px;
        margin-top: 6px;
      }

      .player-body.is-joined .mic-status {
        display: -webkit-box;
        min-height: 0;
        overflow: hidden;
        border: 1px solid rgba(45, 212, 191, 0.18);
        border-radius: 8px;
        background: rgba(15, 23, 42, 0.64);
        color: #cbd5e1;
        padding: 4px 8px;
        font-size: 0.68rem;
        font-weight: 850;
        line-height: 1.15;
        text-align: center;
        white-space: normal;
        -webkit-box-orient: vertical;
        -webkit-line-clamp: 2;
      }

      .player-body.is-joined .mic-button.is-live + .mic-status {
        border-color: rgba(248, 113, 113, 0.34);
        background: rgba(127, 29, 29, 0.38);
        color: #fee2e2;
      }

      .player-body.is-joined .phone-question {
        order: 1;
        min-height: 0;
        flex: 1 1 auto;
        gap: 6px;
        margin-top: 6px;
        border: 1px solid rgba(45, 212, 191, 0.18);
        border-radius: 10px;
        background:
          linear-gradient(180deg, rgba(23, 31, 44, 0.93), rgba(20, 42, 46, 0.82));
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08);
        padding: 6px;
      }

      .player-body.is-joined .phone-question p {
        align-self: flex-start;
        min-height: 22px;
        margin: 0;
        border: 1px solid rgba(125, 211, 252, 0.2);
        border-radius: 999px;
        background: rgba(16, 71, 79, 0.86);
        color: #bae6fd;
        padding: 4px 9px;
        font-size: 0.72rem;
        font-weight: 950;
        line-height: 1.1;
      }

      .player-body.is-joined .phone-question h2 {
        display: -webkit-box;
        overflow: hidden;
        margin: 0;
        border: 1px solid rgba(251, 191, 36, 0.24);
        border-radius: 10px;
        background:
          linear-gradient(180deg, rgba(255, 248, 236, 0.14), rgba(251, 191, 36, 0.08)),
          rgba(26, 24, 32, 0.76);
        color: #fff8ec;
        padding: 7px 9px;
        font-size: clamp(1rem, 5vw, 1.28rem);
        font-weight: 1000;
        line-height: 1.05;
        text-shadow: 0 2px 8px rgba(0, 0, 0, 0.34);
        -webkit-box-orient: vertical;
        -webkit-line-clamp: 2;
      }

      .player-body.is-joined .phone-hints {
        max-height: none;
        overflow: visible;
        gap: 4px;
        margin-top: 0;
      }

      .player-body.is-joined .hint-item {
        border-color: rgba(52, 211, 153, 0.28);
        background: rgba(6, 78, 59, 0.72);
        color: #d1fae5;
        font-size: 0.72rem;
      }

      .player-body.is-joined .phone-choices {
        display: grid;
        min-height: 0;
        flex: 1 0 auto;
        gap: 5px;
        margin-top: 0;
        overflow: visible;
      }

      .player-body.is-joined .phone-choice {
        position: relative;
        min-height: 54px;
        border: 1px solid rgba(255, 255, 255, 0.13);
        border-radius: 10px;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.14), rgba(255, 255, 255, 0.05)),
          rgba(23, 31, 44, 0.92);
        color: #fff8ec;
        padding: 6px 8px;
        gap: 8px;
        box-shadow:
          inset 0 -2px 0 rgba(0, 0, 0, 0.22),
          0 5px 12px rgba(0, 0, 0, 0.16);
      }

      .player-body.is-joined .phone-choice:nth-child(1) {
        border-left: 4px solid #60a5fa;
      }

      .player-body.is-joined .phone-choice:nth-child(2) {
        border-left: 4px solid #34d399;
      }

      .player-body.is-joined .phone-choice:nth-child(3) {
        border-left: 4px solid #fbbf24;
      }

      .player-body.is-joined .phone-choice:nth-child(4) {
        border-left: 4px solid #f472b6;
      }

      .player-body.is-joined .phone-choice:active {
        transform: translateY(1px);
      }

      .player-body.is-joined .phone-choice:disabled {
        border-color: rgba(148, 163, 184, 0.22);
        border-left-color: rgba(148, 163, 184, 0.45);
        background: rgba(30, 41, 59, 0.74);
        color: #94a3b8;
        box-shadow: none;
      }

      .player-body.is-joined .phone-choice.is-selected,
      .player-body.is-joined .phone-choice.is-selected:disabled {
        border-color: rgba(251, 191, 36, 0.84);
        border-left-color: #fbbf24;
        background:
          linear-gradient(180deg, rgba(251, 191, 36, 0.28), rgba(20, 184, 166, 0.1)),
          rgba(30, 41, 59, 0.95);
        color: #fff8ec;
        box-shadow:
          inset 0 0 0 1px rgba(251, 191, 36, 0.2),
          0 0 0 2px rgba(251, 191, 36, 0.18);
        opacity: 1;
      }

      .player-body.is-joined .phone-choice.is-selected::after {
        content: "已選";
        margin-left: auto;
        border-radius: 999px;
        background: rgba(251, 191, 36, 0.18);
        color: #fde68a;
        padding: 3px 7px;
        font-size: 0.68rem;
        font-weight: 1000;
        line-height: 1;
        white-space: nowrap;
      }

      .player-body.is-joined .phone-choice.is-selected .phone-choice-index {
        border-color: rgba(251, 191, 36, 0.5);
        background: #fbbf24;
        color: #1f2937;
      }

      .player-body.is-joined .phone-choice-index {
        width: 28px;
        height: 28px;
        flex-basis: 28px;
        border: 1px solid rgba(255, 255, 255, 0.22);
        background: rgba(15, 23, 42, 0.92);
        color: #fff8ec;
        font-size: 0.78rem;
        box-shadow: inset 0 -2px 0 rgba(0, 0, 0, 0.2);
      }

      .player-body.is-joined .phone-choice-title {
        display: -webkit-box;
        overflow: hidden;
        color: #fff8ec;
        font-size: 0.9rem;
        font-weight: 1000;
        line-height: 1.08;
        -webkit-box-orient: vertical;
        -webkit-line-clamp: 3;
      }

      .player-body.is-joined .phone-result {
        margin-top: 0;
        border-color: rgba(251, 191, 36, 0.36);
        background:
          linear-gradient(180deg, rgba(251, 191, 36, 0.16), rgba(251, 113, 133, 0.08)),
          rgba(15, 23, 42, 0.86);
        color: #fde68a;
        padding: 5px 8px;
        font-size: 0.76rem;
        font-weight: 1000;
        line-height: 1.1;
      }

      .player-body.is-joined .phone-remote-panel {
        order: 2;
        flex: 0 0 auto;
        gap: 6px;
        margin-top: 6px;
        border-color: rgba(45, 212, 191, 0.22);
        background:
          linear-gradient(135deg, rgba(17, 94, 89, 0.36), rgba(53, 43, 68, 0.3)),
          rgba(18, 24, 35, 0.78);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08);
        padding: 6px;
      }

      .player-body.is-joined .phone-remote-head {
        align-items: flex-start;
      }

      .player-body.is-joined .phone-remote-head span {
        max-width: 62%;
        line-height: 1.15;
        white-space: normal;
      }

      .player-body.is-joined .phone-remote-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 5px;
      }

      .player-body.is-joined .phone-remote-grid span {
        min-height: 38px;
        padding: 5px 6px;
      }

      .player-body.is-joined .phone-remote-grid span:nth-child(3) {
        grid-column: 1 / -1;
      }

      .player-body.is-joined .phone-remote-grid strong {
        display: -webkit-box;
        overflow: hidden;
        line-height: 1.1;
        white-space: normal;
        -webkit-box-orient: vertical;
        -webkit-line-clamp: 2;
      }

      .player-body.is-joined .phone-remote-listen {
        min-height: 40px;
        border-color: rgba(45, 212, 191, 0.24);
        background:
          linear-gradient(135deg, rgba(15, 118, 110, 0.32), rgba(251, 191, 36, 0.11)),
          rgba(15, 23, 42, 0.8);
        padding: 7px 8px;
      }

      .player-body.is-joined .phone-remote-listen.needs-unlock {
        border-color: rgba(251, 191, 36, 0.46);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.12),
          0 0 0 2px rgba(251, 191, 36, 0.14);
      }

      .player-body.is-joined .phone-remote-listen strong {
        color: #ccfbf1;
        font-size: 0.74rem;
      }

      .player-body.is-joined .phone-remote-listen span {
        display: -webkit-box;
        overflow: hidden;
        color: #e2e8f0;
        font-size: 0.7rem;
        line-height: 1.15;
        white-space: normal;
        -webkit-box-orient: vertical;
        -webkit-line-clamp: 2;
      }

      .player-body.is-joined .phone-remote-media {
        gap: 4px;
        padding: 4px;
      }

      .player-body.is-joined .phone-remote-frame {
        min-height: 48px;
        max-height: 62px;
      }

      .player-body.is-joined.is-remote-player .phone-remote-panel {
        border-color: rgba(96, 165, 250, 0.28);
        background:
          linear-gradient(135deg, rgba(29, 78, 216, 0.28), rgba(15, 118, 110, 0.22)),
          rgba(18, 24, 35, 0.84);
      }

      .player-body.is-joined.is-remote-player .phone-remote-listen {
        min-height: 46px;
        border-color: rgba(147, 197, 253, 0.32);
        background:
          linear-gradient(135deg, rgba(37, 99, 235, 0.28), rgba(45, 212, 191, 0.16)),
          rgba(17, 24, 39, 0.86);
      }

      .player-body.is-joined:not(.is-remote-player) .phone-remote-panel {
        gap: 4px;
        padding: 5px;
        border-color: rgba(45, 212, 191, 0.16);
        background:
          linear-gradient(135deg, rgba(15, 118, 110, 0.22), rgba(51, 65, 85, 0.18)),
          rgba(15, 23, 42, 0.68);
      }

      .player-body.is-joined:not(.is-remote-player) .phone-remote-head span {
        display: none;
      }

      .player-body.is-joined:not(.is-remote-player) .phone-remote-grid {
        grid-template-columns: minmax(0, 1fr);
      }

      .player-body.is-joined:not(.is-remote-player) .phone-remote-grid span:nth-child(1),
      .player-body.is-joined:not(.is-remote-player) .phone-remote-grid span:nth-child(2),
      .player-body.is-joined:not(.is-remote-player) .phone-remote-roster {
        display: none;
      }

      .player-body.is-joined:not(.is-remote-player) .phone-remote-grid span:nth-child(3) {
        min-height: 32px;
      }

      .player-body.is-joined:not(.is-remote-player) .phone-remote-listen {
        min-height: 34px;
        padding: 5px 7px;
      }

      .player-body.is-joined .buzz-button {
        min-height: clamp(66px, 14svh, 94px);
        margin-top: 0;
        border: 0;
        border-radius: 12px;
        background:
          linear-gradient(180deg, #fde047 0%, #fb923c 46%, #dc2626 100%);
        color: #fff8ec;
        font-size: clamp(1.8rem, 10vw, 2.7rem);
        font-weight: 1000;
        text-shadow: 0 3px 0 rgba(127, 29, 29, 0.46);
        box-shadow:
          inset 0 2px 0 rgba(255, 255, 255, 0.44),
          inset 0 -5px 0 rgba(127, 29, 29, 0.38),
          0 12px 24px rgba(220, 38, 38, 0.25);
      }

      .player-body.is-joined .buzz-button:disabled {
        background:
          linear-gradient(180deg, rgba(148, 163, 184, 0.18), rgba(71, 85, 105, 0.2)),
          rgba(15, 23, 42, 0.88);
        color: #94a3b8;
        text-shadow: none;
        box-shadow: inset 0 0 0 1px rgba(148, 163, 184, 0.16);
      }

      @media (max-height: 690px) {
        .player-body.is-joined .player-card {
          padding: 5px;
        }

        .player-body.is-joined .player-scoreline span,
        .player-body.is-joined .leaderboard-button,
        .player-body.is-joined .mic-button,
        .player-body.is-joined .phone-listen-button {
          min-height: 32px;
        }

        .player-body.is-joined .phone-question {
          gap: 4px;
          padding: 5px;
        }

        .player-body.is-joined .phone-question h2 {
          padding: 6px 8px;
        }

        .player-body.is-joined .phone-choice {
          padding: 5px 7px;
        }

        .player-body.is-joined .buzz-button {
          min-height: 58px;
        }
      }

      @media (max-width: 380px) {
        .player-body.is-joined .phone-choice.is-selected::after {
          align-self: center;
          padding: 3px 6px;
        }
      }

      .player-mode-field,
      .phone-mic-panel,
      .phone-remote-panel {
        display: none !important;
      }
    </style>
  </head>
  <body class="player-body">
    <main class="player-shell">
      <section class="player-card">
        <img class="brand-mark" src="./assets/worship-crest.svg" alt="" aria-hidden="true" />
        <p class="eyebrow">加入估歌遊戲</p>
        <h1>估歌仔</h1>

        <form class="join-form" id="joinForm">
          <div class="player-mode-field" id="playerModeField" hidden aria-hidden="true">
            <span>你現在在哪裡玩？</span>
            <div class="player-mode-switch" aria-label="遊玩方式">
              <button class="player-mode-button" id="onsiteModeButton" type="button" aria-label="我在現場，現場聽聲音">
                <span class="mode-card-icon" aria-hidden="true">
                  <svg viewBox="0 0 24 24"><path d="M12 21s6-5.1 6-11a6 6 0 0 0-12 0c0 5.9 6 11 6 11Z"/><path d="M12 12.2a2.2 2.2 0 1 0 0-4.4 2.2 2.2 0 0 0 0 4.4Z"/></svg>
                </span>
                <span>
                  <strong>我在現場</strong>
                  <small>聽現場聲音，用手機答題</small>
                </span>
              </button>
              <button class="player-mode-button" id="remoteModeButton" type="button" aria-label="我不在現場，手機同步播放">
                <span class="mode-card-icon" aria-hidden="true">
                  <svg viewBox="0 0 24 24"><path d="M7 4h10a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2Z"/><path d="M9 17h6"/><path d="M9 8h6"/><path d="M8 11.5h8"/></svg>
                </span>
                <span>
                  <strong>我不在現場</strong>
                  <small>用手機收聲，照樣答題同開咪</small>
                </span>
              </button>
            </div>
            <p class="join-note">現場版只用手機答題及搶答。</p>
          </div>
          <label for="playerName">你的名字</label>
          <div class="guess-line">
            <input id="playerName" required autocomplete="name" maxlength="18" placeholder="輸入名字" />
            <button class="primary-button" type="submit">加入</button>
          </div>
          <p class="join-note">現場聽前台聲音，用手機答題或搶答。</p>
        </form>

        <div class="player-status" id="playerStatus">掃 QR 後輸入名字加入</div>
        <div class="player-scoreline">
          <span id="playerScore">0 分</span>
          <span id="playerRound">未開始</span>
          <button class="ghost-button leaderboard-button" id="openLeaderboardButton" type="button">
            排行榜
          </button>
        </div>

        <section class="phone-mic-panel" aria-label="手機咪高峰" hidden aria-hidden="true">
          <button class="mic-button" id="micToggleButton" type="button" disabled>開咪對話</button>
          <div class="mic-status" id="phoneMicStatus">未開咪</div>
        </section>

        <section class="phone-remote-panel" id="phoneRemotePanel" aria-label="手機收聽狀態" hidden aria-hidden="true">
          <div class="phone-remote-head">
            <strong id="phoneRemoteTitle">手機收聽</strong>
            <span id="phoneRemoteStatus">等候主持開始</span>
          </div>
          <div class="phone-remote-grid">
            <span>
              <small>倒數</small>
              <strong id="phoneRemoteCountdown">--</strong>
            </span>
            <span>
              <small>組分</small>
              <strong id="phoneRemoteTeams">A 0 · B 0</strong>
            </span>
            <span>
              <small>開咪</small>
              <strong id="phoneRemoteMic">沒有</strong>
            </span>
          </div>
          <div class="phone-remote-listen" id="phoneRemoteListen">
            <div>
              <strong>收聽狀態</strong>
              <span id="phoneRemoteListenStatus">等候玩家開咪或主持音訊</span>
            </div>
            <button class="ghost-button phone-listen-button" id="phoneRemoteListenButton" type="button" hidden>
              啟用收聽
            </button>
          </div>
          <div class="phone-remote-media" id="phoneRemoteMedia" hidden>
            <div class="phone-remote-media-head">
              <strong>同步播放器</strong>
              <span id="phoneRemotePlayerStatus">等候歌曲</span>
            </div>
            <div class="phone-remote-frame" aria-label="手機同步播放器">
              <div id="phoneRemotePlayerHost"></div>
              <div class="phone-remote-shield">
                <strong id="phoneRemoteShieldTitle">答案已遮住</strong>
                <span id="phoneRemoteShieldNote">畫面已遮住答案</span>
              </div>
            </div>
            <button class="ghost-button phone-remote-play-button" id="phoneRemotePlayButton" type="button" hidden>
              重新同步播放
            </button>
          </div>
          <div class="phone-remote-roster" id="phoneRemoteRoster"></div>
        </section>

        <section class="phone-question">
          <p id="phoneStatus">等候主持開始</p>
          <h2 id="phoneTitle">準備中</h2>
          <div class="phone-hints" id="phoneHints"></div>
          <div class="phone-choices" id="phoneChoices"></div>
          <button class="buzz-button" id="buzzButton" type="button" hidden>搶答</button>
          <div class="phone-result" id="phoneResult"></div>
        </section>

      </section>

      <div class="phone-modal" id="leaderboardModal" role="dialog" aria-modal="true" aria-labelledby="leaderboardTitle" hidden>
        <div class="phone-modal-panel">
          <div class="phone-modal-head">
            <h2 id="leaderboardTitle">排行榜</h2>
            <button class="ghost-button" id="closeLeaderboardButton" type="button">關閉</button>
          </div>
          <div id="phoneLeaderboard">
            <div class="phone-empty">等候排行榜</div>
          </div>
        </div>
      </div>
    </main>

    <script src="./vendor/peerjs.min.js?v=1.5.5"></script>
    <script src="./player.js?v=vpn-onsite-1"></script>
  </body>
</html>
